services:
  mongo:
    image: mongo:7
    container_name: college_review_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: college_review
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: college_review_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/college_review
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  mongo_data:
    driver: local

